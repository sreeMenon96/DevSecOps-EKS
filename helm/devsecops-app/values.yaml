replicaCount: 2

image:
  repository: 251246746804.dkr.ecr.ap-south-1.amazonaws.com/devsecops-dev-app
  pullPolicy: Always
  tag: v2

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000

containerPort: 3000

resources:
  
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false

  host: devsecops.local